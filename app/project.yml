name: Ttae
options:
  bundleIdPrefix: dev.gmelon
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: ko
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
    SWIFT_VERSION: "5.9"
packages:
  TtaeCore:
    path: .
targets:
  Ttae:
    type: application
    platform: macOS
    sources:
      - path: Ttae
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gmelon.ttae
        PRODUCT_NAME: Ttae
        CODE_SIGN_ENTITLEMENTS: Ttae/Ttae.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: 떄가아니라때
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 떄가아니라때"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - package: TtaeCore
        product: TtaeCore
